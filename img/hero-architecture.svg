<svg width="920" height="740" viewBox="0 0 920 740" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-arch-title hero-arch-desc">
  <title id="hero-arch-title">Arquitetura Collie OpsMesh - malha entre IA e infraestrutura</title>
  <desc id="hero-arch-desc">Ferramentas de IA (Cursor, Claude Code, Antigravity e outros clientes MCP) orbitam o OpsMesh. O Control Plane governa identidade, politica, aprovacao e auditoria; MeshAgents operam a infraestrutura hibrida sem acesso direto da IA ao cluster.</desc>

  <defs>
    <linearGradient id="canvasGrad" x1="0" y1="0" x2="920" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <radialGradient id="coreAura" cx="460" cy="300" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#2563EB" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenAura" cx="460" cy="500" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coreFill" x1="292" y1="200" x2="628" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="infraShelf" x1="60" y1="600" x2="860" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0B1220" flood-opacity="0.10"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#2563EB" flood-opacity="0.22"/>
    </filter>
    <pattern id="meshDots" width="28" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(12)">
      <circle cx="2" cy="2" r="1.1" fill="#94A3B8" opacity="0.28"/>
    </pattern>
  </defs>

  <!-- Canvas -->
  <rect width="920" height="740" rx="24" fill="url(#canvasGrad)"/>
  <rect width="920" height="740" rx="24" fill="url(#meshDots)" opacity="0.55"/>
  <circle cx="460" cy="300" r="220" fill="url(#coreAura)"/>
  <circle cx="460" cy="520" r="160" fill="url(#greenAura)"/>

  <!-- Orbit rings (mesh metaphor) -->
  <g fill="none" class="orbit-ring">
    <circle cx="460" cy="292" r="268" stroke="#CBD5E1" stroke-width="1.25" stroke-dasharray="2 14" opacity="0.7"/>
    <circle cx="460" cy="292" r="218" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="7 11" opacity="0.55"/>
    <circle cx="460" cy="292" r="168" stroke="#BFDBFE" stroke-width="1" opacity="0.45"/>
  </g>

  <!-- Mesh weave arcs -->
  <g stroke="#93C5FD" stroke-width="1.25" fill="none" opacity="0.35">
    <path d="M220 180c60 40 120 70 240 70s180-30 240-70"/>
    <path d="M200 380c70-30 140-50 260-50s190 20 260 50"/>
  </g>

  <!-- Orbit beads -->
  <g fill="#2563EB" opacity="0.35">
    <circle cx="460" cy="24" r="3"/>
    <circle cx="678" cy="120" r="2.5"/>
    <circle cx="242" cy="120" r="2.5"/>
    <circle cx="700" cy="360" r="2.5"/>
    <circle cx="220" cy="360" r="2.5"/>
  </g>

  <!-- Layer label: pedido -->
  <text x="48" y="56" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1.8">PEDIDO</text>

  <!-- AI tool nodes -->
  <g filter="url(#cardShadow)">
    <rect x="378" y="36" width="164" height="48" rx="14" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
    <circle cx="402" cy="60" r="7" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="402" cy="60" r="3" fill="#2563EB"/>
    <text x="418" y="65" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0B1220">Cursor</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="668" y="148" width="176" height="48" rx="14" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
    <circle cx="692" cy="172" r="7" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="692" cy="172" r="3" fill="#2563EB"/>
    <text x="708" y="177" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0B1220">Claude Code</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="76" y="148" width="176" height="48" rx="14" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
    <circle cx="100" cy="172" r="7" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="100" cy="172" r="3" fill="#2563EB"/>
    <text x="116" y="177" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0B1220">Antigravity</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="700" y="372" width="152" height="48" rx="14" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="724" cy="396" r="7" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
    <circle cx="724" cy="396" r="3" fill="#22C55E"/>
    <text x="740" y="401" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#0B1220">MCP clients</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="68" y="372" width="140" height="48" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="92" cy="396" r="7" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
    <circle cx="92" cy="396" r="3" fill="#64748B"/>
    <text x="108" y="401" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#0B1220">Cockpit</text>
  </g>

  <!-- Inbound paths to core -->
  <g stroke="#2563EB" stroke-width="1.75" fill="none" opacity="0.45" stroke-linecap="round">
    <path d="M460 84v52"/>
    <path d="M668 172c-36 20-88 48-140 68"/>
    <path d="M252 172c36 20 88 48 140 68"/>
    <path d="M700 396c-48-10-110-36-160-62"/>
    <path d="M208 396c48-10 110-36 160-62"/>
  </g>
  <!-- Direction ticks -->
  <g fill="#2563EB" opacity="0.55">
    <path d="M456 128l4 8 4-8z"/>
    <path d="M548 248l-6 6 10 2z"/>
    <path d="M372 248l6 6-10 2z"/>
  </g>

  <!-- OpsMesh core -->
  <g filter="url(#softGlow)">
    <rect x="276" y="198" width="368" height="220" rx="28" fill="url(#coreFill)"/>
    <rect x="276" y="198" width="368" height="220" rx="28" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.65"/>
    <!-- inner rim -->
    <rect x="290" y="212" width="340" height="192" rx="22" fill="none" stroke="#1E293B" stroke-width="1"/>
  </g>

  <!-- Tiny mesh inside core -->
  <g stroke="#334155" stroke-width="1" opacity="0.55">
    <path d="M320 250h280M320 278h280M320 306h280"/>
    <path d="M360 230v100M420 230v100M500 230v100M560 230v100"/>
  </g>

  <text x="460" y="246" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#93C5FD" text-anchor="middle" letter-spacing="2.2">COLLIE OPSMESH</text>
  <text x="460" y="282" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800" fill="#FFFFFF" text-anchor="middle">Control Plane</text>
  <text x="460" y="308" font-family="Inter,Arial,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">MCP Bridge · FGAC · Jobs</text>

  <!-- Governance chips -->
  <g font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    <rect x="304" y="330" width="72" height="28" rx="8" fill="#1E293B"/>
    <text x="340" y="348" fill="#E2E8F0">Identity</text>
    <rect x="384" y="330" width="64" height="28" rx="8" fill="#1E293B"/>
    <text x="416" y="348" fill="#E2E8F0">Policy</text>
    <rect x="456" y="330" width="78" height="28" rx="8" fill="#1E293B"/>
    <text x="495" y="348" fill="#BBF7D0">Approval</text>
    <rect x="542" y="330" width="62" height="28" rx="8" fill="#1E293B"/>
    <text x="573" y="348" fill="#E2E8F0">Audit</text>
  </g>

  <text x="460" y="392" font-family="Inter,Arial,sans-serif" font-size="11" fill="#64748B" text-anchor="middle">IA pede · OpsMesh governa · Agents executam</text>

  <!-- Layer label: execucao -->
  <text x="48" y="458" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1.8">EXECUCAO</text>

  <!-- Pull spine -->
  <path d="M460 418v28" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="460" cy="452" r="5" fill="#22C55E"/>

  <!-- Pipeline row -->
  <g filter="url(#cardShadow)">
    <rect x="168" y="468" width="156" height="56" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="246" y="492" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">TRANSPORTE</text>
    <text x="246" y="512" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0B1220" text-anchor="middle">Gateway</text>

    <rect x="382" y="468" width="156" height="56" rx="16" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="460" y="492" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#16A34A" text-anchor="middle">PULL HTTPS</text>
    <text x="460" y="512" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0B1220" text-anchor="middle">MeshAgent</text>

    <rect x="596" y="468" width="156" height="56" rx="16" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
    <text x="674" y="492" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#16A34A" text-anchor="middle">PERIMETRO</text>
    <text x="674" y="512" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#0B1220" text-anchor="middle">Outbound-only</text>
  </g>

  <path d="M324 496h48" stroke="#CBD5E1" stroke-width="2"/>
  <path d="M366 488l12 8-12 8" fill="none" stroke="#2563EB" stroke-width="2"/>
  <path d="M538 496h48" stroke="#CBD5E1" stroke-width="2"/>
  <path d="M580 488l12 8-12 8" fill="none" stroke="#22C55E" stroke-width="2"/>

  <!-- Infra foundation -->
  <text x="48" y="568" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1.8">INFRAESTRUTURA GOVERNADA</text>

  <g filter="url(#cardShadow)">
    <rect x="60" y="580" width="800" height="100" rx="20" fill="url(#infraShelf)" stroke="#E2E8F0"/>
    <!-- subtle top rail -->
    <path d="M90 600h740" stroke="#E2E8F0" stroke-width="1"/>

    <!-- five pillars -->
    <g font-family="Inter,Arial,sans-serif" text-anchor="middle">
      <rect x="96" y="612" width="128" height="48" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="160" y="641" font-size="13" font-weight="700" fill="#0B1220">Kubernetes</text>

      <rect x="244" y="612" width="112" height="48" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="300" y="641" font-size="13" font-weight="700" fill="#0B1220">Linux</text>

      <rect x="376" y="612" width="112" height="48" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="432" y="641" font-size="13" font-weight="700" fill="#0B1220">Cloud</text>

      <rect x="508" y="612" width="128" height="48" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="572" y="641" font-size="13" font-weight="700" fill="#0B1220">Databases</text>

      <rect x="656" y="612" width="128" height="48" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="720" y="641" font-size="13" font-weight="700" fill="#0B1220">Legacy</text>
    </g>
  </g>

  <text x="460" y="716" font-family="Inter,Arial,sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Sem acesso direto da IA ao cluster - so acoes tipadas apos governanca</text>
</svg>
