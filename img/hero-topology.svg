<svg width="1800" height="1100" viewBox="0 0 1800 1100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Background de topologia operacional</title>
  <desc id="hero-desc">Grade sutil de engenharia com estrutura de rede abstrata.</desc>

  <!-- Base fill -->
  <rect width="1800" height="1100" fill="#F8FAFC"/>

  <!-- Subtle radial gradients -->
  <defs>
    <radialGradient id="glow-blue" cx="0.78" cy="0.18" r="0.55" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="0.18" cy="0.82" r="0.50" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <!-- Dot pattern -->
    <pattern id="dot-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#94A3B8" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Gradient layers -->
  <rect width="1800" height="1100" fill="url(#glow-blue)"/>
  <rect width="1800" height="1100" fill="url(#glow-green)"/>

  <!-- Engineering dot grid -->
  <rect width="1800" height="1100" fill="url(#dot-grid)"/>

  <!-- Fine connecting lines suggesting network topology -->
  <g stroke="#94A3B8" stroke-width="0.5" fill="none" stroke-linecap="round">
    <!-- Cluster top-right -->
    <line x1="1300" y1="180" x2="1420" y2="220" opacity="0.16"/>
    <line x1="1420" y1="220" x2="1380" y2="340" opacity="0.14"/>
    <line x1="1300" y1="180" x2="1380" y2="340" opacity="0.12"/>
    <line x1="1420" y1="220" x2="1540" y2="260" opacity="0.13"/>
    <line x1="1540" y1="260" x2="1500" y2="380" opacity="0.12"/>

    <!-- Cluster center-left -->
    <line x1="260" y1="420" x2="380" y2="460" opacity="0.15"/>
    <line x1="380" y1="460" x2="340" y2="580" opacity="0.14"/>
    <line x1="260" y1="420" x2="340" y2="580" opacity="0.12"/>
    <line x1="380" y1="460" x2="500" y2="500" opacity="0.13"/>

    <!-- Cluster bottom-center -->
    <line x1="780" y1="700" x2="900" y2="740" opacity="0.16"/>
    <line x1="900" y1="740" x2="860" y2="860" opacity="0.14"/>
    <line x1="780" y1="700" x2="860" y2="860" opacity="0.12"/>
    <line x1="900" y1="740" x2="1020" y2="780" opacity="0.13"/>
    <line x1="1020" y1="780" x2="980" y2="860" opacity="0.12"/>

    <!-- Sparse long-range connections (very faint) -->
    <line x1="340" y1="580" x2="780" y2="700" opacity="0.08"/>
    <line x1="500" y1="500" x2="900" y2="740" opacity="0.07"/>
    <line x1="1380" y1="340" x2="1020" y2="780" opacity="0.06"/>

    <!-- A few isolated short segments -->
    <line x1="620" y1="180" x2="700" y2="260" opacity="0.14"/>
    <line x1="700" y1="260" x2="740" y2="220" opacity="0.12"/>
    <line x1="1100" y1="500" x2="1180" y2="540" opacity="0.13"/>
    <line x1="1180" y1="540" x2="1140" y2="620" opacity="0.12"/>
  </g>

  <!-- Subtle node dots at intersection points -->
  <g fill="#94A3B8">
    <circle cx="1300" cy="180" r="1.5" opacity="0.14"/>
    <circle cx="1420" cy="220" r="1.5" opacity="0.16"/>
    <circle cx="1380" cy="340" r="1.5" opacity="0.14"/>
    <circle cx="1540" cy="260" r="1.2" opacity="0.12"/>
    <circle cx="260" cy="420" r="1.5" opacity="0.14"/>
    <circle cx="380" cy="460" r="1.5" opacity="0.16"/>
    <circle cx="340" cy="580" r="1.5" opacity="0.14"/>
    <circle cx="500" cy="500" r="1.2" opacity="0.12"/>
    <circle cx="780" cy="700" r="1.5" opacity="0.14"/>
    <circle cx="900" cy="740" r="1.5" opacity="0.16"/>
    <circle cx="860" cy="860" r="1.5" opacity="0.14"/>
    <circle cx="1020" cy="780" r="1.2" opacity="0.12"/>
    <circle cx="980" cy="860" r="1.2" opacity="0.12"/>
    <circle cx="620" cy="180" r="1.2" opacity="0.12"/>
    <circle cx="700" cy="260" r="1.2" opacity="0.13"/>
    <circle cx="1100" cy="500" r="1.2" opacity="0.12"/>
    <circle cx="1180" cy="540" r="1.2" opacity="0.13"/>
  </g>
</svg>
