<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada | Collie AI Engineering</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0B1220" />
  <link rel="icon" type="image/png" href="/img/favicon.png" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .error-page {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 48px 24px;
      background: var(--color-bg, #F8FAFC);
      text-align: center;
    }
    .error-page h1 {
      font-family: var(--font-display, Georgia, serif);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      margin: 0 0 12px;
      color: var(--color-obsidian, #0B1220);
    }
    .error-page p {
      margin: 0 0 28px;
      color: var(--color-text-secondary, #475569);
      max-width: 40ch;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div>
      <p class="section-kicker" style="margin-bottom: 12px;">404</p>
      <h1>Essa página não existe.</h1>
      <p>O endereço pode ter mudado ou o link está incompleto. Volte para a home da Collie.</p>
      <a class="btn btn-primary btn-lg" href="/">Ir para o início</a>
    </div>
  </main>
</body>
</html>
